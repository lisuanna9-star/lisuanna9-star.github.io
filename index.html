<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>欢迎来到李金昕的个人主页！</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                   Roboto, "PingFang SC", "Microsoft YaHei";
      background: #f5f7fa;
      color: #333;
    }

    .container {
      max-width: 900px;
      margin: 80px auto;
      padding: 20px;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 10px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 16px;
      margin-top: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }

    a {
      color: #4f46e5;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    button {
      margin-top: 10px;
      padding: 8px 14px;
      border-radius: 8px;
      border: none;
      background: #4f46e5;
      color: white;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>你好，我是 李金昕 👋</h1>
    <p>中文→法学→临床 | 音乐爱好者 | 喜欢探索技术与科学结合</p>

    <div class="card">
      <h2>关于我</h2>
      <p>这里写你的自我介绍。比如研究兴趣、方向、目标等。</p>
    </div>

    <div class="card">
      <h2>项目</h2>
      <ul>
        <li>项目1：xxxxx</li>
        <li>项目2：xxxxx</li>
      </ul>
    </div>

    <div class="card">
      <h2>联系我</h2>
      <p>Email：your@email.com</p>
      <button onclick="showMessage()">点我</button>
    </div>
  </div>

  <script>
    function showMessage() {
      alert("欢迎来到我的个人主页 🚀");
    }
  </script>

</body>
</html>
